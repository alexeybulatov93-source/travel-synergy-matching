<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Synergy · Corona Travel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1a1d4a;
    --navy-d: #131647;
    --navy-b: #303672;
    --gold: #B2906A;
    --gold-lt: #C8A97E;
    --gold-pale: #F6E0CB;
    --text: #e8eaf6;
    --text-dim: #9095c0;
    --card: rgba(48,54,114,0.35);
    --card-border: rgba(178,144,106,0.18);
    --ok: #4caf82;
    --warn: #e8a040;
    --danger: #e05a5a;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Onest', sans-serif;
    background: var(--navy-d);
    color: var(--text);
    min-height: 100vh;
    font-weight: 300;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--navy-d); }
  ::-webkit-scrollbar-thumb { background: var(--navy-b); border-radius: 2px; }

  /* ── LAYOUT ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }
  .header {
    background: var(--navy);
    border-bottom: 1px solid var(--card-border);
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo img { height: 32px; width: auto; filter: drop-shadow(0 0 8px rgba(178,144,106,0.25)); }
  .logo-label {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.08em;
    line-height: 1.3;
  }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .user-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 40px;
    padding: 6px 14px 6px 8px;
    font-size: 13px;
  }
  .role-badge {
    font-family: 'Unbounded', sans-serif;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .role-seller { background: rgba(178,144,106,0.2); color: var(--gold); }
  .role-buyer  { background: rgba(76,175,130,0.2); color: var(--ok); }
  .role-admin  { background: rgba(224,90,90,0.15); color: var(--danger); }

  .btn-logout {
    background: none; border: 1px solid var(--card-border);
    color: var(--text-dim); border-radius: 8px;
    padding: 6px 14px; cursor: pointer; font-size: 13px;
    font-family: 'Onest', sans-serif;
    transition: all .2s;
  }
  .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

  .main { flex: 1; padding: 28px 24px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--card-border); padding-bottom: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    font-family: 'Onest', sans-serif; font-weight: 400;
    font-size: 13px; padding: 10px 18px;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .2s; margin-bottom: -1px;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px; letter-spacing: 0.04em;
    color: var(--gold); margin-bottom: 16px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

  /* ── BUYER LIST ── */
  .buyer-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    background: rgba(26,29,74,0.5);
    border: 1px solid var(--card-border);
    border-radius: 10px;
    margin-bottom: 8px;
    transition: border-color .2s;
    cursor: default;
  }
  .buyer-item:hover { border-color: rgba(178,144,106,0.4); }
  .buyer-info { display: flex; align-items: center; gap: 12px; }
  .buyer-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--navy-b);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 13px; color: var(--gold);
    flex-shrink: 0;
  }
  .buyer-name { font-weight: 500; font-size: 14px; }
  .buyer-company { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .buyer-right { display: flex; align-items: center; gap: 10px; }

  /* ── MATCH RATE ── */
  .match-badge {
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px;
    font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 600;
  }
  .match-gold { background: rgba(178,144,106,0.2); color: var(--gold); border: 1px solid rgba(178,144,106,0.4); }
  .match-ok   { background: rgba(76,175,130,0.15); color: var(--ok);   border: 1px solid rgba(76,175,130,0.3); }
  .match-dim  { background: rgba(144,149,192,0.1); color: var(--text-dim); border: 1px solid rgba(144,149,192,0.2); }
  .match-dot  { width: 6px; height: 6px; border-radius: 50%; }
  .dot-gold { background: var(--gold); }
  .dot-ok   { background: var(--ok); }
  .dot-dim  { background: var(--text-dim); }

  /* ── BUTTONS ── */
  .btn {
    font-family: 'Onest', sans-serif; font-weight: 500;
    border: none; border-radius: 8px; cursor: pointer;
    transition: all .2s; font-size: 13px; padding: 8px 16px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: var(--gold-lt); transform: translateY(-1px); }
  .btn-outline { background: none; border: 1px solid var(--card-border); color: var(--text-dim); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-ok { background: rgba(76,175,130,0.15); border: 1px solid rgba(76,175,130,0.4); color: var(--ok); }
  .btn-ok:hover { background: rgba(76,175,130,0.25); }
  .btn-danger { background: rgba(224,90,90,0.12); border: 1px solid rgba(224,90,90,0.35); color: var(--danger); }
  .btn-danger:hover { background: rgba(224,90,90,0.22); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ── SLOT GRID ── */
  .slot-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .slot-btn {
    padding: 10px; border-radius: 8px; border: 1px solid var(--card-border);
    background: rgba(26,29,74,0.5); color: var(--text);
    font-family: 'Onest', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s; text-align: center;
  }
  .slot-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .slot-btn.taken { opacity: 0.35; cursor: not-allowed; background: rgba(0,0,0,0.2); }
  .slot-btn.mine  { border-color: var(--ok); color: var(--ok); background: rgba(76,175,130,0.1); }
  .slot-btn.selected { border-color: var(--gold); background: rgba(178,144,106,0.15); color: var(--gold); }

  /* ── SCHEDULE ── */
  .schedule-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    margin-bottom: 8px;
    background: rgba(26,29,74,0.4);
  }
  .schedule-time {
    font-family: 'Unbounded', sans-serif; font-size: 13px;
    color: var(--gold); min-width: 48px;
  }
  .schedule-info { flex: 1; }
  .schedule-name { font-weight: 500; font-size: 14px; }
  .schedule-company { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
  .status-badge {
    font-size: 11px; padding: 3px 9px; border-radius: 20px;
    font-family: 'Unbounded', sans-serif; letter-spacing: 0.04em;
  }
  .status-pending   { background: rgba(232,160,64,0.15); color: var(--warn); }
  .status-confirmed { background: rgba(76,175,130,0.15); color: var(--ok); }
  .status-declined  { background: rgba(224,90,90,0.12); color: var(--danger); }

  /* ── NOTIFICATIONS ── */
  .notif-item {
    padding: 12px 16px; border-radius: 10px;
    border: 1px solid var(--card-border); margin-bottom: 8px;
    background: rgba(26,29,74,0.4);
    display: flex; align-items: flex-start; gap: 12px;
  }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin-top: 4px; flex-shrink: 0; }
  .notif-dot.read { background: var(--text-dim); }
  .notif-text { font-size: 13px; line-height: 1.5; }
  .notif-time { font-size: 11px; color: var(--text-dim); margin-top: 3px; }

  /* ── FORMS ── */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; background: rgba(26,29,74,0.7);
    border: 1px solid var(--card-border); border-radius: 8px;
    padding: 10px 14px; color: var(--text);
    font-family: 'Onest', sans-serif; font-size: 14px;
    outline: none; transition: border-color .2s;
  }
  .form-input:focus { border-color: var(--gold); }
  .form-input::placeholder { color: var(--text-dim); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  /* Kill webkit autofill white/yellow flash */
  .form-input:-webkit-autofill,
  .form-input:-webkit-autofill:hover,
  .form-input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0 100px #141748 inset !important;
    -webkit-text-fill-color: #e8eaf6 !important;
    caret-color: #e8eaf6;
    transition: background-color 99999s ease 0s;
  }
  .form-input { -webkit-appearance: none; appearance: none; }
  /* Kill ALL tap highlights and focus rings */
  * { -webkit-tap-highlight-color: transparent !important; }
  button:focus, input:focus, select:focus, textarea:focus {
    outline: none !important; box-shadow: none !important;
  }

  /* ── LOGIN PAGE ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--navy-d);
    background-image: radial-gradient(circle at 20% 50%, rgba(48,54,114,0.4) 0%, transparent 60%),
                      radial-gradient(circle at 80% 20%, rgba(178,144,106,0.1) 0%, transparent 50%);
  }
  .login-box {
    width: 360px; padding: 40px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo img {
    height: 40px; width: auto;
    filter: drop-shadow(0 0 14px rgba(178,144,106,0.4));
  }
  .login-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px; color: var(--gold);
    text-align: center; margin-bottom: 6px;
  }
  .login-sub { font-size: 13px; color: var(--text-dim); text-align: center; margin-bottom: 28px; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,12,40,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; backdrop-filter: blur(4px);
  }
  .modal {
    width: 480px; max-width: 95vw;
    background: #1e2255;
    border: 1px solid var(--card-border);
    border-radius: 16px; padding: 28px;
  }
  .modal-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px; color: var(--gold); margin-bottom: 20px;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  /* ── ADMIN MATRIX ── */
  .matrix-wrap { overflow-x: auto; }
  .matrix-table { border-collapse: collapse; min-width: 100%; }
  .matrix-table th, .matrix-table td {
    border: 1px solid var(--card-border);
    padding: 8px 12px; font-size: 12px; white-space: nowrap;
  }
  .matrix-table th { background: var(--navy-b); color: var(--gold); font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: 0.05em; }
  .matrix-table td { background: rgba(26,29,74,0.4); }
  .matrix-cell-ok    { background: rgba(76,175,130,0.18) !important; color: var(--ok); }
  .matrix-cell-pend  { background: rgba(232,160,64,0.13) !important; color: var(--warn); }

  /* ── STATS ── */
  .stat-box { text-align: center; padding: 20px; }
  .stat-num { font-family: 'Unbounded', sans-serif; font-size: 32px; color: var(--gold); }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  /* ── UTILS ── */
  .page { display: none; }
  .page.active { display: block; }
  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: var(--card-border);
  }
  .empty { text-align: center; color: var(--text-dim); padding: 40px; font-size: 14px; }
  .divider { height: 1px; background: var(--card-border); margin: 20px 0; }
  .tag {
    display: inline-block;
    background: rgba(178,144,106,0.12);
    border: 1px solid rgba(178,144,106,0.25);
    color: var(--gold-lt);
    border-radius: 20px; padding: 2px 10px;
    font-size: 11px; margin: 2px;
  }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy-b); border: 1px solid var(--gold);
    color: var(--text); padding: 12px 20px; border-radius: 10px;
    font-size: 13px; z-index: 999; animation: slideIn .3s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(60px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid rgba(178,144,106,0.3);
    border-top-color: var(--gold);
    border-radius: 50%; animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .notif-count {
    background: var(--gold); color: #fff;
    border-radius: 50%; width: 18px; height: 18px;
    font-size: 10px; font-family: 'Unbounded', sans-serif;
    display: inline-flex; align-items: center; justify-content: center;
    margin-left: 4px;
  }

  /* ── MATCH REASON TOOLTIP ── */
  .reason-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 16px; padding: 2px 4px;
    transition: color .2s;
  }
  .reason-btn:hover { color: var(--gold); }

  /* inline profile block */
  .profile-block { background: rgba(26,29,74,0.6); border-radius: 10px; padding: 16px; }
  .profile-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: flex-start; }
  .profile-key { font-size: 11px; color: var(--text-dim); min-width: 120px; padding-top: 1px; }
  .profile-val { font-size: 13px; flex: 1; }

  @media (max-width: 768px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .slot-grid { grid-template-columns: repeat(3,1fr); }
    .main { padding: 12px; }
    .modal { padding: 18px; width: 95vw !important; }
    /* Header: fix bell clinging to logo */
    .header { padding: 0 12px; height: 52px; gap: 8px; }
    .header-right { gap: 8px; }
    .logo-label { display: none; }
    .logo img { height: 24px !important; }
    .logo { gap: 8px; }
    #notifBell { margin-left: auto; display: flex; align-items: center; }
    .user-pill { padding: 4px 8px 4px 6px; font-size: 11px; gap: 5px; }
    .btn-logout { padding: 5px 10px; font-size: 11px; }
    .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 0; flex-wrap: nowrap; }
    .tab { white-space: nowrap; font-size: 12px; padding: 10px 12px; }
    .buyer-item { flex-wrap: wrap; gap: 8px; }
    .buyer-right { width: 100%; justify-content: flex-end; }
    .schedule-item { flex-wrap: wrap; }
    .section-title { font-size: 13px; }
    /* Admin create form — stack vertically on mobile */
    .admin-create-form { display: flex !important; flex-direction: column !important; gap: 10px !important; width: 100% !important; }
    .admin-create-form .form-group { margin: 0; width: 100% !important; }
    .admin-create-form input, .admin-create-form select, .admin-create-form button { width: 100% !important; box-sizing: border-box; }
    /* Profile grid stacks on mobile */
    #profileContent > div { grid-template-columns: 1fr !important; }
    /* Matrix scrolls horizontally */
    .matrix-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    /* Login box */
    .login-box { width: 92vw; padding: 28px 20px; }
    /* Password eye button — no outline/shadow glitch */
    #eyeBtn { outline: none !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
    #eyeBtn:focus { outline: none !important; box-shadow: none !important; }
    /* Stats */
    #adminStats { grid-template-columns: 1fr 1fr 1fr !important; }
    .stat-num { font-size: 22px; }
    /* Modal actions stack */
    .modal-actions { flex-wrap: wrap; }
    .modal-actions .btn { flex: 1; justify-content: center; min-width: 80px; }
  }
  @media (max-width: 400px) {
    .slot-grid { grid-template-columns: repeat(2,1fr); }
    #adminStats { grid-template-columns: 1fr !important; }
    .stat-box { padding: 12px; }
    .stat-num { font-size: 18px; }
  }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN PAGE ══════════════════ -->
<div id="loginPage" class="login-wrap">

  <!-- MAIN -->
  <main class="main">

    <!-- TABS -->
    <div id="tabBar" class="tabs"></div>

    <!-- ── SELLER: Buyers list ── -->

      <div class="section-title">Байеры · матчинг</div>
      <div id="buyersList"></div>
    </div>

    <!-- ── SELLER / BUYER: Schedule ── -->
    <div id="tabSchedule" class="page">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="section-title" style="margin-bottom:0;flex:1;">Моё расписание</div>

        </button>
      </div>
      <div id="scheduleList"></div>
    </div>

    <!-- ── BUYER: Incoming requests ── -->

<!-- Modal: Propose meeting -->
<div id="modalPropose" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Предложить встречу</div>
    <div id="proposeBuyerInfo" style="margin-bottom:16px;"></div>
    <div class="form-group">
      <label class="form-label">Выберите удобный слот</label>
      <div id="proposeSlots" class="slot-grid"></div>
    </div>
    <div id="proposeAltMsg" style="display:none;font-size:12px;color:var(--warn);margin-top:8px;"></div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modalPropose')">Отмена</button>
      <button class="btn btn-gold btn-sm" id="proposeSendBtn" onclick="sendProposal()" disabled>Отправить запрос</button>
    </div>
  </div>
</div>

<!-- Modal: Meeting detail (buyer respond) -->
<div id="modalMeeting" class="modal-overlay" style="display:none;">
  <div class="modal">
    <div class="modal-title">Запрос на встречу</div>
    <div id="meetingDetail" style="margin-bottom:16px;"></div>
    <div class="form-group" id="altSlotGroup" style="display:none;">
      <label class="form-label">Предложить другое время</label>
      <div id="altSlots" class="slot-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="closeModal('modalMeeting')">Закрыть</button>
      <button class="btn btn-outline btn-sm" id="btnAltSlot" onclick="toggleAltSlot()">⏱ Другое время</button>
      <button class="btn btn-danger btn-sm" id="btnDecline" onclick="respondMeeting('declined')">Отклонить</button>
      <button class="btn btn-ok btn-sm" id="btnConfirm" onclick="respondMeeting('confirmed')">Подтвердить ✓</button>
    </div>

<script>
// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://snurfexcbscqxykujweq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNudXJmZXhjYnNjcXh5a3Vqd2VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjkwMTEsImV4cCI6MjA4OTUwNTAxMX0.sRvMfgrR0m6AS-57_3FvzcRnuMfTkUbAf5gnK94AroY';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ══════════════════════════════════════════════

// ══════════════════════════════════════════════
let currentUser = null;
let allSlots    = [];
let allBuyers   = [];
let allSellers  = [];
let myMeetings  = [];
let myMatches   = [];
let myNotifs    = [];

// modal state
let proposeTarget   = null;  // buyer user object
let proposeSlotId   = null;
let meetingTarget   = null;  // meeting object

// ══════════════════════════════════════════════
// LOGIN / LOGOUT
// ══════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass  = document.getElementById('loginPass').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!email || !pass) { showLoginError('Заполните email и пароль'); return; }

  const login = email.toLowerCase().trim();
  const { data, error } = await sb
    .from('users')
    .select('*')
    .eq('login', login)
    .eq('password_hash', pass)
    .eq('event_id', EVENT_ID)
    .single();

  if (error || !data) { showLoginError('Неверный логин или пароль'); return; }

  currentUser = data;
  sessionStorage.setItem('ts_user_id', data.id);
  await startApp();
}

function showLoginError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
}

async function checkSession() {
  const uid = sessionStorage.getItem('ts_user_id');
  if (!uid) return false;
  const { data } = await sb.from('users').select('*').eq('id', uid).single();
  if (!data) return false;
  currentUser = data;
  return true;
}

function doLogout() {
  sessionStorage.removeItem('ts_user_id');
  if (realtimeChannel) sb.removeChannel(realtimeChannel);
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('appRoot').style.display = 'none';
  currentUser = null;
}

// ══════════════════════════════════════════════
// APP INIT
// ══════════════════════════════════════════════
async function startApp() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('appRoot').style.display = 'flex';

  // header
  const roleMap = { seller:'role-seller', buyer:'role-buyer', admin:'role-admin' };
  const roleLabel = { seller:'SELLER', buyer:'БАЙЕР', admin:'ADMIN' };
  document.getElementById('userName').textContent = currentUser.name;
  setTimeout(updateHeaderAvatar, 100);
  const rb = document.getElementById('roleLabel');
  rb.textContent = roleLabel[currentUser.role];
  rb.className = 'role-badge ' + roleMap[currentUser.role];

  // load data FIRST, then build tabs (so renderBuyers has data when first called)
  await Promise.all([loadSlots(), loadUsers(), loadMeetings(), loadNotifs(), loadMatches()]);

  // tabs (after data is ready)
  buildTabs();
  setupRealtime();
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
const TABS = {
  seller: [
    { id:'buyers',        label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Байеры' },
    { id:'schedule',      label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Расписание' },
    { id:'notifications', label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Уведомления' },
    { id:'profile',       label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль' },
  ],
  buyer: [
    { id:'requests',      label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>Запросы' },
    { id:'schedule',      label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Расписание' },
    { id:'notifications', label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Уведомления' },
    { id:'profile',       label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Профиль' },
  ],
  admin: [
    { id:'admin',         label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Участники' },
    { id:'notifications', label:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:5px;"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>Уведомления' },
  ],
};

let activeTab = null;

function buildTabs() {
  const tabs = TABS[currentUser.role] || [];
  const bar  = document.getElementById('tabBar');
  bar.innerHTML = tabs.map(t =>
    `<button class="tab" data-tab="${t.id}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
  switchTab(tabs[0].id);
}

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'tab' + cap(id)));
  renderTab(id);
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function renderTab(id) {
  if (id === 'buyers')        { renderBuyers(); return; }
  if (id === 'schedule')      renderSchedule();
  if (id === 'requests')      renderRequests();
  if (id === 'notifications') renderNotifications();
  if (id === 'profile')       renderProfile();
  if (id === 'admin')         renderAdmin();
}

// ══════════════════════════════════════════════
// DATA LOADERS
// ══════════════════════════════════════════════
async function loadSlots() {
  const { data } = await sb.from('slots').select('*').eq('event_id', EVENT_ID).order('sort_order');
  allSlots = data || [];
}

async function loadUsers() {
  const { data } = await sb.from('users').select('*').eq('event_id', EVENT_ID);
  allBuyers  = (data || []).filter(u => u.role === 'buyer');
  allSellers = (data || []).filter(u => u.role === 'seller');
}

async function loadMeetings() {
  const { data } = await sb.from('meetings')
    .select('*, slot:slot_id(*), alt_slot:alt_slot_id(*), seller:seller_id(id,name,company,role), buyer:buyer_id(id,name,company,role)')
    .eq('event_id', EVENT_ID)
    .or(`seller_id.eq.${currentUser.id},buyer_id.eq.${currentUser.id}`);
  myMeetings = data || [];
}

async function loadAllMeetings() {
  const { data } = await sb.from('meetings')
    .select('*, slot:slot_id(*), seller:seller_id(id,name,company), buyer:buyer_id(id,name,company)')
    .eq('event_id', EVENT_ID);
  return data || [];
}

async function loadMatches() {
  if (currentUser.role !== 'seller' && currentUser.role !== 'admin') { myMatches = []; return; }
  const col = currentUser.role === 'seller' ? 'seller_id' : 'event_id';
  const val = currentUser.role === 'seller' ? currentUser.id : EVENT_ID;
  const { data } = await sb.from('matches').select('*').eq(col, val);
  myMatches = data || [];
}

async function loadNotifs() {
  const { data } = await sb.from('notifications')
    .select('*').eq('user_id', currentUser.id).order('sent_at', { ascending: false }).limit(30);
  myNotifs = data || [];
  updateNotifBadge();
}

function updateNotifBadge() {
  const unread = myNotifs.filter(n => !n.is_read).length;
  const el = document.getElementById('notifCount');
  if (unread > 0) { el.style.display = 'flex'; el.textContent = unread; }
  else { el.style.display = 'none'; }
}

// ══════════════════════════════════════════════
// RENDER FUNCTIONS
// ══════════════════════════════════════════════

function render() { renderTab(activeTab); }

/* ── BUYERS ── */
async function renderBuyers() {
  try {
    const el = document.getElementById('buyersList');
    if (!el) return;

    // If allBuyers is empty, try loading directly (safety net)
    if (!allBuyers.length) {
      await loadUsers();
    }

    const buyers = allBuyers;
    if (!buyers.length) {
      el.innerHTML = '<div class="empty" style="padding:32px;text-align:center;color:var(--text-dim);">Байеры не найдены в базе данных</div>';
      return;
    }

    let sorted = [...buyers];
    if (currentUser.role === 'seller') {
      sorted.sort(function(a,b) {
        const ma = getMatch(a.id); const mb = getMatch(b.id);
        if (mb.rate !== ma.rate) return mb.rate - ma.rate;
        return a.company.localeCompare(b.company, 'ru');
      });
    }

    el.innerHTML = sorted.map(function(b) {
      const m = getMatch(b.id);
      const initials = b.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
      const matchCls = m.rate >= 65 ? 'match-gold' : m.rate >= 40 ? 'match-ok' : 'match-dim';
      const dotCls   = m.rate >= 65 ? 'dot-gold'   : m.rate >= 40 ? 'dot-ok'   : 'dot-dim';
      const existing = myMeetings.find(function(mt) {
        return (mt.seller_id === currentUser.id || (mt.seller && mt.seller.id === currentUser.id)) &&
               (mt.buyer_id  === b.id           || (mt.buyer  && mt.buyer.id  === b.id));
      });
      const btnDisabled = (currentUser.role === 'admin' || !!existing) ? 'disabled' : '';
      const btnLabel = existing
        ? (existing.status === 'confirmed' ? '&#10003; Подтверждено' : '&#9203; Ожидает')
        : 'Предложить встречу';

      const dirTags = (b.directions && b.directions.length)
        ? b.directions.slice(0,3).map(function(d){ return '<span class="tag" style="font-size:10px;padding:1px 7px;">' + d + '</span>'; }).join('')
        : '';
      const audienceHint = b.audience
        ? '<span style="font-size:11px;color:var(--text-dim);margin-left:4px;">· ' + b.audience + '</span>'
        : '';

      return '<div class="buyer-item" style="flex-wrap:wrap;gap:10px;">' +
        '<div class="buyer-info" style="cursor:pointer;flex:1;min-width:0;" onclick="showBuyerCard(\'' + b.id + '\')">' +
          '<div class="buyer-avatar" style="flex-shrink:0;">' + initials + '</div>' +
          '<div style="min-width:0;">' +
            '<div class="buyer-name" style="display:flex;align-items:center;gap:4px;">' +
              b.company +
              '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
            '</div>' +
            '<div class="buyer-company">' + b.name + audienceHint + '</div>' +
            (dirTags ? '<div style="margin-top:4px;">' + dirTags + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="buyer-right" style="flex-shrink:0;">' +
          (m.rate > 0 ? '<div class="match-badge ' + matchCls + '"><span class="match-dot ' + dotCls + '"></span>' + m.rate + '%</div>' : '') +
          (currentUser.role === 'seller'
            ? '<button class="btn btn-gold btn-sm" onclick="openPropose(\'' + b.id + '\')" ' + btnDisabled + '>' + btnLabel + '</button>'
            : '') +
        '</div>' +
      '</div>';
    }).join('');
  } catch(err) {
    console.error('renderBuyers error:', err);
    var el = document.getElementById('buyersList');
    if (el) el.innerHTML = '<div class="empty" style="color:#f87171;padding:20px;">Ошибка загрузки байеров: ' + err.message + '</div>';
  }
}

/* ── SCHEDULE ── */
function renderSchedule() {
  const el = document.getElementById('scheduleList');
  const confirmed = myMeetings.filter(m => m.status === 'confirmed');

  if (!confirmed.length) {
    el.innerHTML = '<div class="empty">Подтверждённых встреч пока нет</div>';
    return;
  }

  const sorted = confirmed.sort((a,b) => (a.slot?.sort_order||0) - (b.slot?.sort_order||0));

  el.innerHTML = sorted.map(m => {
    const other = currentUser.role === 'seller' ? m.buyer : m.seller;
    const otherId = other && other.id;
    const clickFn = currentUser.role === 'seller'
      ? 'showBuyerCard(\'' + otherId + '\')'
      : 'showSellerCard(\'' + otherId + '\')';
    return '<div class="schedule-item">' +
      '<div class="schedule-time">' + (m.slot&&m.slot.time_label||'—') + '</div>' +
      '<div class="schedule-info" style="cursor:pointer;" onclick="' + clickFn + '">' +
        '<div class="schedule-name">' + (other&&other.company||'—') +
          ' <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '</div>' +
        '<div class="schedule-company">' + (other&&other.name||'—') + '</div>' +
      '</div>' +
      '<span class="status-badge status-confirmed">✓ Подтверждено</span>' +
    '</div>';
  }).join('');
}

/* ── REQUESTS (buyer) ── */
function renderRequests() {
  const el = document.getElementById('requestsList');
  const pending = myMeetings.filter(m =>
    (m.buyer_id === currentUser.id || m.buyer?.id === currentUser.id) &&
    m.status === 'pending'
  );
  const others = myMeetings.filter(m =>
    (m.buyer_id === currentUser.id || m.buyer?.id === currentUser.id) &&
    m.status !== 'pending'
  );

  if (!pending.length && !others.length) {
    el.innerHTML = '<div class="empty">Запросов пока нет — селлеры скоро свяжутся с вами</div>';
    return;
  }

  const renderItem = function(m) {
    const seller = m.seller;
    const initials = (seller&&seller.name) ? seller.name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase() : '?';
    const fullSeller = allSellers.find(function(s){ return s.id === (seller&&seller.id); }) || seller || {};
    const avatarHtml = fullSeller.avatar_url
      ? '<img src="'+fullSeller.avatar_url+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
      : initials;
    const statusMap = {
      pending: '<span class="status-badge status-pending">Ожидает ответа</span>',
      confirmed: '<span class="status-badge status-confirmed">✓ Подтверждено</span>',
      declined: '<span class="status-badge status-declined">Отклонено</span>',
    };
    return '<div class="buyer-item">' +
      '<div class="buyer-info" style="cursor:pointer;" onclick="showSellerCard(\'' + (seller&&seller.id) + '\')">' +
        '<div class="buyer-avatar" style="background:var(--navy);">' + avatarHtml + '</div>' +
        '<div>' +
          '<div class="buyer-name">' + (seller&&seller.company||'—') +
            ' <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
          '</div>' +
          '<div class="buyer-company">' + (seller&&seller.name||'—') + ' · ' + (m.slot&&m.slot.time_label||'—') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="buyer-right">' +
        (statusMap[m.status]||'') +
        (m.status === 'pending' ? '<button class="btn btn-gold btn-sm" onclick="openMeeting(\'' + m.id + '\')">Ответить</button>' : '') +
      '</div>' +
    '</div>';
  };

  el.innerHTML = (pending.length ? '<div style="margin-bottom:8px;font-size:12px;color:var(--warn);">● Ожидают ответа</div>' : '') +
    pending.map(renderItem).join('') +
    (others.length ? '<div class="divider"></div>' : '') +
    others.map(renderItem).join('');
}

/* ── NOTIFICATIONS ── */
async function renderNotifications() {
  const el = document.getElementById('notifList');
  if (!myNotifs.length) { el.innerHTML = '<div class="empty">Уведомлений нет</div>'; return; }

  el.innerHTML = myNotifs.map(n => `
    <div class="notif-item">
      <div class="notif-dot ${n.is_read ? 'read' : ''}"></div>
      <div>
        <div class="notif-text">${n.message}</div>
        <div class="notif-time">${formatTime(n.sent_at)}</div>
      </div>
    </div>`).join('');

  // mark all as read
  const unreadIds = myNotifs.filter(n => !n.is_read).map(n => n.id);
  if (unreadIds.length) {
    await sb.from('notifications').update({ is_read: true }).in('id', unreadIds);
    myNotifs.forEach(n => { if (unreadIds.includes(n.id)) n.is_read = true; });
    updateNotifBadge();
  }
}

/* renderProfile — moved to profile section below */

/* ── ADMIN ── */
async function renderAdmin() {
  renderAdminParticipants();
  const all = await loadAllMeetings();
  const total     = all.length;
  const confirmed = all.filter(m => m.status === 'confirmed').length;
  const pending   = all.filter(m => m.status === 'pending').length;

  document.getElementById('adminStats').innerHTML = `
    <div class="card stat-box"><div class="stat-num">${total}</div><div class="stat-label">Всего встреч</div></div>
    <div class="card stat-box"><div class="stat-num" style="color:var(--ok)">${confirmed}</div><div class="stat-label">Подтверждено</div></div>
    <div class="card stat-box"><div class="stat-num" style="color:var(--warn)">${pending}</div><div class="stat-label">Ожидают</div></div>
  `;

  // Matrix: sellers × buyers
  const sellers = allSellers;
  const buyers  = allBuyers;

  if (!sellers.length || !buyers.length) {
    document.getElementById('adminMatrix').innerHTML = '<div class="empty">Нет данных</div>';
    return;
  }

  let html = '<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Селлер</th>';
  buyers.forEach(b => { html += `<th>${b.company}</th>`; });
  html += '</tr></thead><tbody>';

  sellers.forEach(s => {
    html += `<tr><td><b>${s.company}</b><br><small style="color:var(--text-dim)">${s.name}</small></td>`;
    buyers.forEach(b => {
      const m = all.find(mt =>
        (mt.seller_id === s.id || mt.seller?.id === s.id) &&
        (mt.buyer_id  === b.id || mt.buyer?.id  === b.id)
      );
      if (m) {

}

function openPropose(buyerId) {
  proposeTarget = allBuyers.find(b => b.id === buyerId);
  proposeSlotId = null;
  document.getElementById('proposeSendBtn').disabled = true;

  const initials = proposeTarget.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('proposeBuyerInfo').innerHTML = `
    <div class="buyer-info" style="padding:12px;background:rgba(26,29,74,0.5);border-radius:8px;">
      <div class="buyer-avatar">${initials}</div>
      <div>
        <div class="buyer-name">${proposeTarget.name}</div>
        <div class="buyer-company">${proposeTarget.company}</div>
      </div>
    </div>`;

  // build slot grid
  const takenSlots = myMeetings
    .filter(m => (m.seller_id === currentUser.id || m.seller?.id === currentUser.id) && m.status !== 'declined' && m.status !== 'cancelled')
    .map(m => m.slot_id);

  document.getElementById('proposeSlots').innerHTML = allSlots.map(function(s) {
    var taken = takenSlots.includes(s.id);
    var cls = 'slot-btn' + (taken ? ' taken' : '');
    var oc = taken ? '' : ' onclick="selectSlot(\'' + s.id + '\', this)"';
    var dis = taken ? ' disabled' : '';
    return '<button class="' + cls + '"' + oc + dis + '>' + s.time_label + '</button>';

function selectSlot(slotId, btn) {
  proposeSlotId = slotId;
  document.querySelectorAll('#proposeSlots .slot-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('proposeSendBtn').disabled = false;
}

async function sendProposal() {
  if (!proposeSlotId || !proposeTarget) return;
  const btn = document.getElementById('proposeSendBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';

  const { error } = await sb.from('meetings').insert({
    seller_id:   currentUser.id,
    buyer_id:    proposeTarget.id,
    slot_id:     proposeSlotId,
    event_id:    EVENT_ID,
    status:      'pending',
    proposed_by: 'seller',
  });

  if (error) {
    toast('Ошибка: ' + (error.message || 'попробуйте ещё раз'));
    btn.disabled = false; btn.innerHTML = 'Отправить запрос';
    return;
  }

  // Notify buyer
  await sb.from('notifications').insert({
    user_id: proposeTarget.id,
    message: `${currentUser.company} предлагает встречу в ${allSlots.find(s=>s.id===proposeSlotId)?.time_label}`,
    type: 'meeting_request',
  });

  await loadMeetings();
  closeModal('modalPropose');
  toast('Запрос отправлен ✓');
  renderBuyers();
}

function toggleAltSlot() {
  const g = document.getElementById('altSlotGroup');
  const showing = g.style.display !== 'none';
  if (showing) { g.style.display = 'none'; altSlotId = null; return; }

  // build alt slots (exclude current)
  const takenSlots = myMeetings
    .filter(m => (m.buyer_id === currentUser.id || m.buyer?.id === currentUser.id) && m.status === 'confirmed')

async function respondMeeting(status) {
  if (!meetingTarget) return;

  const updates = { status, updated_at: new Date().toISOString() };
  if (status === 'pending' && altSlotId) {
    updates.alt_slot_id = altSlotId;
    updates.proposed_by = 'buyer';
  }

  const { error } = await sb.from('meetings').update(updates).eq('id', meetingTarget.id);
  if (error) { toast('Ошибка обновления'); return; }

  // Notify seller
  const slotLabel = allSlots.find(s => s.id === meetingTarget.slot_id)?.time_label;
  const msgMap = {
    confirmed: `${currentUser.company} подтвердил встречу в ${slotLabel}`,
    declined:  `${currentUser.company} отклонил запрос на ${slotLabel}`,
  };
  await sb.from('notifications').insert({
    user_id: meetingTarget.seller_id || meetingTarget.seller?.id,
    message: msgMap[status] || 'Ответ на запрос встречи',
    type: 'meeting_' + status,

  await loadMeetings();
  closeModal('modalMeeting');
  toast(status === 'confirmed' ? 'Встреча подтверждена ✓' : 'Запрос отклонён');

function generateLogin(company) {
  const map = {
    'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z',
    'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
    'с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh',
    'щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya',
    ' ':''
  };
  return company.toLowerCase()
    .split('').map(c => map[c] !== undefined ? map[c] : c)
    .join('').replace(/[^a-z0-9]/g,'').slice(0,16);
}

function generatePassword() {
  const lower = 'abcdefghjkmnpqrstuvwxyz';
  const upper = 'ABCDEFGHJKMNPQRSTUVWXYZ';
  const digits = '23456789';
  const special = '!@#';
  let p = upper[Math.floor(Math.random()*upper.length)];
  for (let i=0;i<5;i++) p += lower[Math.floor(Math.random()*lower.length)];
  p += digits[Math.floor(Math.random()*digits.length)];
  p += special[Math.floor(Math.random()*special.length)];
  return p;
}

async function saveProfile() {
  const updates = {
    name:    document.getElementById('pName').value.trim(),
    company: document.getElementById('pCompany').value.trim(),

  if (currentUser.role !== 'buyer') {
    const dir = document.getElementById('pDirections').value;

async function uploadAvatar(input, type) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1 * 1024 * 1024) { toast('Файл слишком большой — максимум 1 МБ. Сожми фото и попробуй снова.'); return; }

  // Convert to base64 data URL and store in users table (no storage bucket needed for MVP)
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    const updateData = type === 'avatar' ? { avatar_url: dataUrl } : { logo_url: dataUrl };
    const { error } = await sb.from('users').update(updateData).eq('id', currentUser.id);
    if (error) { toast('Ошибка загрузки: ' + error.message); return; }
    currentUser[col] = dataUrl;

    // Update preview
    const previewId = type === 'avatar' ? 'avatarPreview' : 'logoPreview';

        el.innerHTML = '<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:cover;">';
      } else {
        el.innerHTML = '<img src="'+dataUrl+'" style="width:100%;height:100%;object-fit:contain;padding:6px;">';
      }
    }

    // Update header avatar if seller/buyer
    updateHeaderAvatar();
    toast(type === 'avatar' ? 'Фото загружено ✓' : 'Логотип загружен ✓');
  };
  reader.readAsDataURL(file);
}

function updateHeaderAvatar() {
  // Show avatar in header user pill if available
  const pill = document.getElementById('userName');
  if (currentUser.avatar_url && pill) {
    const existingImg = pill.previousSibling;
    if (existingImg && existingImg.tagName === 'IMG') existingImg.remove();

    img.style.cssText = 'width:24px;height:24px;border-radius:50%;object-fit:cover;margin-right:4px;';

}

}

// Show/hide password inline
function togglePwdView(userId, pwd) {
  const el = document.getElementById('pwd_' + userId);
  if (!el) return;
  if (el.dataset.showing === '1') {
    el.textContent = '••••••••';
    el.dataset.showing = '0';
    el.style.color = 'var(--text-dim)';
  } else {
    el.textContent = pwd;
    el.dataset.showing = '1';
    el.style.color = 'var(--gold-lt)';
  }
}

let _editUserId = null;

async function openEditParticipant(userId) {
  const { data: u } = await sb.from('users').select('*').eq('id', userId).single();
  if (!u) return;
  _editUserId = userId;

  // Count siblings (same company, same event)
  const { data: siblings } = await sb.from('users')
    .select('id').eq('company', u.company).eq('event_id', EVENT_ID).neq('id', userId).neq('role','admin');
  const sibCount = siblings ? siblings.length : 0;

  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.id = 'modalEditParticipant';
  div.style.display = 'flex';

  const isSeller = u.role === 'seller';
  div.innerHTML =
    '<div class="modal" style="width:520px;max-height:90vh;overflow-y:auto;">' +
      '<div class="modal-title">Редактировать участника</div>' +

        '<div class="form-group"><label class="form-label">УТП</label><textarea id="ep_utp" class="form-input">' + escHtml(u.utp||'') + '</textarea></div>' +
        '<div class="form-group"><label class="form-label">Заметки для партнёров</label><textarea id="ep_notes" class="form-input">' + escHtml(u.notes||'') + '</textarea></div>'
      : '') +
      '<div style="background:rgba(26,29,74,0.5);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--text-dim);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;">' +

async function saveEditParticipant() {
  const updates = {
    name:    document.getElementById('ep_name').value.trim(),
    company: document.getElementById('ep_company').value.trim(),
    login:   document.getElementById('ep_login').value.trim().toLowerCase(),
    role:    document.getElementById('ep_role').value,
    telegram_id: document.getElementById('ep_tg').value.trim(),
  };
  const newPass = document.getElementById('ep_pass').value.trim();
  if (newPass) updates.password_hash = newPass;

  const role = updates.role;
  if (role === 'seller') {
    const dir = document.getElementById('ep_dir').value;
    updates.directions = dir ? dir.split(',').map(function(s){return s.trim();}).filter(Boolean) : [];
    updates.audience = document.getElementById('ep_aud').value.trim();
    updates.services = document.getElementById('ep_srv').value.trim();
    updates.utp      = document.getElementById('ep_utp').value.trim();
    updates.notes    = document.getElementById('ep_notes').value.trim();
    updates.profile_ready = !!(updates.directions.length && updates.utp);
  }

  const { error } = await sb.from('users').update(updates).eq('id', _editUserId);
  if (error) { toast('Ошибка: ' + error.message); return; }

  document.getElementById('modalEditParticipant').remove();
  await loadUsers();
  renderAdmin();
  toast('Участник обновлён ✓');
}

// ── MULTI-USER: check company limit ──
// Sellers: max 2 per company unless admin override
async function createParticipant() {
  const company = document.getElementById('newCompany').value.trim();
  const name    = document.getElementById('newName').value.trim();
  const role    = document.getElementById('newRole').value;
  if (!company || !name) { toast('Заполни название компании и имя'); return; }

  // Check company limit for sellers (2 per company)
  if (role === 'seller') {
    const { data: existing } = await sb.from('users')
      .select('id').eq('company', company).eq('event_id', EVENT_ID).eq('role','seller');
    if (existing && existing.length >= 2) {
      if (!confirm('От компании "' + company + '" уже ' + existing.length + ' участника. Как организатор вы можете добавить ещё. Продолжить?')) return;
    }
  }

  const login = generateLogin(company);
  const pass  = _generatedPass || generatePassword();
  const { data: dup } = await sb.from('users').select('id').eq('login', login).eq('event_id', EVENT_ID);
  const finalLogin = (dup && dup.length) ? login + Math.floor(Math.random()*8+2) : login;

  const { error } = await sb.from('users').insert({
    login: finalLogin, password_hash: pass, role, name, company,
    event_id: EVENT_ID, profile_ready: false,
  });
  if (error) { toast('Ошибка: ' + error.message); return; }

  showCredentials(finalLogin, pass, name, company, role);
  document.getElementById('newCompany').value = '';
  document.getElementById('newName').value = '';
  document.getElementById('loginPreview').style.display = 'none';
  _generatedPass = '';
  await loadUsers();
  renderAdmin();
}

}

  // Admin exports full matrix
  const today = new Date().toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'});

  loadAllMeetings().then(function(all) {
    const sellers = allSellers;
    const buyers  = allBuyers;
    const confirmed = all.filter(function(m){ return m.status==='confirmed'; });
    const pending   = all.filter(function(m){ return m.status==='pending'; });

    let matrixRows = sellers.map(function(s) {
      const cells = buyers.map(function(b) {
        const m = all.find(function(mt){ return (mt.seller_id===s.id||mt.seller&&mt.seller.id===s.id) && (mt.buyer_id===b.id||mt.buyer&&mt.buyer.id===b.id); });
        if (!m) return '<td style="padding:8px;border:1px solid #eee;color:#ccc;text-align:center;">—</td>';
        const bg = m.status==='confirmed' ? '#e8f5ee' : '#fff8ee';
        const col = m.status==='confirmed' ? '#2e7d52' : '#b8620a';
        return '<td style="padding:8px;border:1px solid #eee;background:'+bg+';color:'+col+';text-align:center;font-weight:600;">' + (m.slot&&m.slot.time_label||'—') + '</td>';
      }).join('');
      return '<tr><td style="padding:8px 12px;border:1px solid #eee;font-weight:600;">' + s.company + '<br><span style="font-size:11px;color:#888;">' + s.name + '</span></td>' + cells + '</tr>';

// ══════════════════════════════════════════════
// BUYER PROFILE CARD (for sellers to view)
// ══════════════════════════════════════════════
function showBuyerCard(buyerId) {
  const buyer = allBuyers.find(function(b){ return b.id === buyerId; });
  if (!buyer) return;
  const initials = buyer.name.split(' ').map(function(w){ return w[0]||''; }).join('').slice(0,2).toUpperCase();
  const m = getMatch(buyerId);

  const div = document.createElement('div');
  div.className = 'modal-overlay';
  div.style.display = 'flex';
  div.innerHTML =
    '<div class="modal" style="width:440px;">' +
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">' +
        '<div style="width:56px;height:56px;border-radius:50%;background:var(--navy-b);display:flex;align-items:center;justify-content:center;font-family:Unbounded,sans-serif;font-size:18px;color:var(--gold);flex-shrink:0;overflow:hidden;">' +
          (buyer.avatar_url ? '<img src="'+buyer.avatar_url+'" style="width:100%;height:100%;object-fit:cover;">' : initials) +
        '</div>' +
        '<div>' +
          '<div style="font-size:17px;font-weight:600;">' + buyer.company + '</div>' +
          '<div style="font-size:13px;color:var(--text-dim);margin-top:2px;">' + buyer.name + '</div>' +
          (m.rate > 0 ? '<div style="margin-top:6px;"><span class="match-badge '+(m.rate>=65?'match-gold':m.rate>=40?'match-ok':'match-dim')+'"><span class="match-dot '+(m.rate>=65?'dot-gold':m.rate>=40?'dot-ok':'dot-dim')+'"></span>Match Rate: '+m.rate+'%</span></div>' : '') +
        '</div>' +
        (buyer.logo_url ? '<img src="'+buyer.logo_url+'" style="height:36px;width:auto;object-fit:contain;margin-left:auto;max-width:100px;">' : '') +
      '</div>' +
      '<div class="profile-block">' +
        (buyer.audience ? '<div class="profile-row"><span class="profile-key">Аудитория</span><span class="profile-val">'+buyer.audience+'</span></div>' : '') +
        (buyer.services ? '<div class="profile-row"><span class="profile-key">Услуги</span><span class="profile-val">'+buyer.services+'</span></div>' : '') +
        (buyer.notes    ? '<div class="profile-row"><span class="profile-key">Заметки</span><span class="profile-val">'+buyer.notes+'</span></div>' : '') +
        (!buyer.audience && !buyer.services && !buyer.notes ?
          '<div style="text-align:center;color:var(--text-dim);padding:16px;font-size:13px;">Участник ещё не заполнил профиль</div>' : '') +
      '</div>' +
      (m.reason ? '<div style="margin-top:12px;padding:12px;background:rgba(178,144,106,0.08);border-radius:8px;font-size:12px;color:var(--text-dim);line-height:1.5;"><b style="color:var(--gold);">Почему этот матч:</b> ' + m.reason + '</div>' : '') +
      '<div class="modal-actions">' +
        '<button class="btn btn-outline btn-sm" onclick="this.closest(\'.modal-overlay\').remove()">Закрыть</button>' +
        '<button class="btn btn-gold btn-sm" onclick="this.closest(\'.modal-overlay\').remove();openPropose(\''+buyerId+'\')">Предложить встречу</button>' +
      '</div>' +
    '</div>';

  div.addEventListener('click', function(e){ if(e.target===div) div.remove(); });
  document.body.appendChild(div);
}

// ADMIN: PDF for individual participant
// ══════════════════════════════════════════════
async function exportParticipantPDF(userId) {
  const { data: u } = await sb.from('users').select('*').eq('id', userId).single();
  if (!u) return;

  const { data: mtgs } = await sb.from('meetings')
    .select('*, slot:slot_id(*), seller:seller_id(id,name,company), buyer:buyer_id(id,name,company)')
    .eq('event_id', EVENT_ID)
    .eq('status', 'confirmed')
    .or('seller_id.eq.'+userId+',buyer_id.eq.'+userId);

  const sorted = (mtgs||[]).sort(function(a,b){ return (a.slot&&a.slot.sort_order||0)-(b.slot&&b.slot.sort_order||0); });
  const roleRu = u.role === 'seller' ? 'Селлер' : 'Байер';
  const today = new Date().toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});


  const rows = sorted.map(function(m) {
    const other = u.role === 'seller' ? m.buyer : m.seller;
    return '<tr><td style="padding:10px 14px;border-bottom:1px solid #e8e0d5;font-weight:700;font-size:15px;color:#303476;">'+
      (m.slot&&m.slot.time_label||'—')+'</td>'+
      '<td style="padding:10px 14px;border-bottom:1px solid #e8e0d5;">'+(other&&other.name||'—')+'</td>'+

    '.seller-badge{background:#B88F64;color:#fff;} .buyer-badge{background:#2e7d52;color:#fff;}'+
    '.summary{display:flex;gap:28px;background:#f5f3ef;border-radius:8px;padding:14px 18px;margin-bottom:18px;}'+
    '.sum-item{text-align:center;} .sum-num{font-size:22px;font-weight:700;color:#303476;} .sum-label{font-size:10px;color:#888;}'+
    'table{width:100%;border-collapse:collapse;border:1px solid #e0d5c5;border-radius:8px;overflow:hidden;}'+
    'th{text-align:left;padding:10px 14px;background:#1a1d4a;color:#B88F64;font-size:11px;letter-spacing:.05em;}'+

    '<div class="header">'+
      '<div><h1>'+u.name+'<span class="badge '+(u.role==='seller'?'seller':'buyer')+'-badge">'+roleRu+'</span></h1>'+

// ADMIN: upload avatar/logo for any participant
// ══════════════════════════════════════════════
function uploadParticipantImage(input, userId, type) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 1*1024*1024) { toast('Файл слишком большой — до 1 МБ'); return; }
  const reader = new FileReader();
  reader.onload = async function(e) {
    const dataUrl = e.target.result;
    const updateData2 = type === 'avatar' ? { avatar_url: dataUrl } : { logo_url: dataUrl };
    const { error } = await sb.from('users').update(updateData2).eq('id', userId);
    if (error) { toast('Ошибка: ' + error.message); return; }
    // update local cache
    const u = [...allSellers,...allBuyers].find(function(x){ return x.id===userId; });
    if (u) u[col] = dataUrl;
    toast(type==='avatar' ? 'Фото загружено ✓' : 'Логотип загружен ✓');
    renderAdminParticipants();
  };
  reader.readAsDataURL(file);
}

// QUICK COPY credentials
// ══════════════════════════════════════════════
function quickCopy(btn) {
  const login = btn.dataset.login || '';
  const pass  = btn.dataset.pass  || '';
  const text = 'Логин: ' + login + '\nПароль: ' + pass;
  const doToast = function() { toast('✓ Логин и пароль скопированы'); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doToast).catch(function() {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      ta.remove(); doToast();
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    ta.remove(); doToast();
  }
}

function apPreviewLogin(val) {
  var el = document.getElementById('ap_loginVal');
  if (el) el.textContent = generateLogin(val) || '—';
}

async function createParticipantFromModal() {
  var company = (document.getElementById('ap_company').value || '').trim();
  var name    = (document.getElementById('ap_name').value || '').trim();
  var role    = document.getElementById('ap_role').value || 'seller';
  var pass    = document.getElementById('ap_pass_hidden').value;
  var isNew   = document.getElementById('ap_is_new_company').value === '1';

  if (!company || !name) { toast('Заполни название компании и имя'); return; }

  var finalLogin;
  if (isNew) {
    // New company — generate unique login
    var login = generateLogin(company);
    var { data: dup } = await sb.from('users').select('id').eq('login', login).eq('event_id', EVENT_ID);
    finalLogin = (dup && dup.length) ? login + Math.floor(Math.random()*8+2) : login;
  } else {
    // Existing company — reuse shared login (stored in hidden field)
    finalLogin = document.getElementById('ap_login_hidden').value;
  }

  var { error } = await sb.from('users').insert({
    login: finalLogin, password_hash: pass, role: role, name: name, company: company,
    event_id: EVENT_ID, profile_ready: false,
  });
  if (error) { toast('Ошибка: ' + error.message); return; }

  var modal = document.getElementById('modalAddPerson');
  if (modal) modal.remove();
  showCredentials(finalLogin, pass, name, company, role);
  await loadUsers();
  renderAdmin();
}
